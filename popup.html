<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>VoxFlow</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="vpr-popup-container">
    <header class="vpr-header">
      <div class="vpr-logo-icon">
        <img src="icons/icon128.png" alt="VoxFlow Logo">
      </div>
      <div class="vpr-title-group">
        <h1>VoxFlow</h1>
        <p>AI-Powered Speech Transcription</p>
      </div>
    </header>

    <!-- Tab Navigation -->
    <div class="vpr-tabs">
      <button class="vpr-tab active" data-tab="settings">Settings</button>
      <button class="vpr-tab" data-tab="history">History</button>
    </div>

    <!-- Settings Tab -->
    <div class="vpr-tab-content active" id="tab-settings">
      <form id="settings-form">
        <!-- API Key -->
        <div class="vpr-card">
          <label class="vpr-label" for="apiKey">API Key</label>
          <div class="vpr-input-group">
            <input type="password" id="apiKey" class="vpr-input" placeholder="gsk_..." required>
          </div>
          <p class="vpr-hint">
            Free from <a href="https://console.groq.com/keys" target="_blank" class="vpr-link">Groq Console</a>
          </p>
        </div>

        <!-- Template Selector -->
        <div class="vpr-card">
          <label class="vpr-label">Refinement Mode</label>
          <div class="vpr-template-grid" id="template-grid">
            <button type="button" class="vpr-template-btn active" data-template="ai-prompt">
              <svg class="vpr-tpl-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a4 4 0 0 1 4 4v1a3 3 0 0 1 3 3v1a2 2 0 0 1-2 2h-1l-2 8H10l-2-8H7a2 2 0 0 1-2-2v-1a3 3 0 0 1 3-3V6a4 4 0 0 1 4-4z"/></svg>
              <span>AI Prompt</span>
            </button>
            <button type="button" class="vpr-template-btn" data-template="email">
              <svg class="vpr-tpl-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
              <span>Email</span>
            </button>
            <button type="button" class="vpr-template-btn" data-template="code-comment">
              <svg class="vpr-tpl-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
              <span>Code</span>
            </button>
            <button type="button" class="vpr-template-btn" data-template="tweet">
              <svg class="vpr-tpl-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
              <span>Post</span>
            </button>
            <button type="button" class="vpr-template-btn" data-template="notes">
              <svg class="vpr-tpl-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
              <span>Notes</span>
            </button>
          </div>
        </div>

        <!-- Toggles -->
        <div class="vpr-card vpr-toggle-card">
          <div class="vpr-toggle-info">
            <span class="vpr-toggle-label">Live Preview</span>
            <span class="vpr-toggle-desc">Show live text while recording</span>
          </div>
          <label class="vpr-switch">
            <input type="checkbox" id="livePreview">
            <span class="vpr-slider"></span>
          </label>
        </div>

        <div class="vpr-card vpr-toggle-card">
          <div class="vpr-toggle-info">
            <span class="vpr-toggle-label">Auto-Insert</span>
            <span class="vpr-toggle-desc">Skip review, insert directly</span>
          </div>
          <label class="vpr-switch">
            <input type="checkbox" id="autoInsert">
            <span class="vpr-slider"></span>
          </label>
        </div>

        <div class="vpr-card vpr-toggle-card">
          <div class="vpr-toggle-info">
            <span class="vpr-toggle-label" id="mode-label">Light Mode</span>
            <span class="vpr-toggle-desc" id="mode-desc">Switch appearance</span>
          </div>
          <label class="vpr-switch">
            <input type="checkbox" id="lightMode">
            <span class="vpr-slider"></span>
          </label>
        </div>

        <div class="vpr-actions-popup">
          <button type="submit" class="vpr-btn vpr-btn-primary">
            <svg style="width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2" viewBox="0 0 24 24">
              <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
              <polyline points="17 21 17 13 7 13 7 21"></polyline>
              <polyline points="7 3 7 8 15 8"></polyline>
            </svg>
            Save Settings
          </button>
          
          <button type="button" id="test-recording-btn" class="vpr-btn vpr-btn-secondary">
            <svg style="width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="10"></circle>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
            Test Recording
          </button>
        </div>
      </form>
    </div>

    <!-- History Tab -->
    <div class="vpr-tab-content" id="tab-history">
      <div id="history-list" class="vpr-history-list">
        <div class="vpr-history-empty">
          <p>No recordings yet</p>
          <p class="vpr-hint">Your refined prompts will appear here</p>
        </div>
      </div>
      <button type="button" id="clear-history-btn" class="vpr-btn vpr-btn-secondary" style="display:none; margin-top: 8px;">
        Clear History
      </button>
    </div>

    <div id="status-message" class="status-message"></div>
    
    <footer class="vpr-footer">
      <span class="vpr-kbd">Ctrl+Shift+V</span> to record
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
